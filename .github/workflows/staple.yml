name: Staple notarization ticket

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to staple (e.g. v1.2.1). Defaults to latest."
        required: false
        type: string

jobs:
  staple:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Resolve release tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG=$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName -q .tagName)
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Stapling release: $TAG"

      - name: Check for notarization artifact (workflow_run only)
        id: artifact_check
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          # CI only uploads the `notarization` artifact when it actually
          # publishes a new release. If absent, this push didn't release —
          # skip the rest of the workflow cleanly.
          COUNT=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID/artifacts" \
            --jq '[.artifacts[] | select(.name=="notarization")] | length')
          if [ "$COUNT" = "0" ]; then
            echo "No notarization artifact on CI run $RUN_ID — nothing to staple."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download notarization submission ID artifact
        if: github.event_name == 'workflow_run' && steps.artifact_check.outputs.found == 'true'
        uses: actions/download-artifact@v4
        with:
          name: notarization
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve submission ID
        id: submission
        if: github.event_name == 'workflow_dispatch' || steps.artifact_check.outputs.found == 'true'
        env:
          AC_API_KEY_BASE64: ${{ secrets.AC_API_KEY_BASE64 }}
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
        run: |
          if [ -f submission-id.txt ]; then
            ID=$(cat submission-id.txt)
            echo "Using submission ID from artifact: $ID"
          else
            # Manual dispatch with no artifact — pick the most recent submission.
            KEY_PATH="$RUNNER_TEMP/api.p8"
            echo -n "$AC_API_KEY_BASE64" | base64 --decode -o "$KEY_PATH"
            ID=$(xcrun notarytool history \
              --key "$KEY_PATH" \
              --key-id "$AC_API_KEY_ID" \
              --issuer "$AC_API_ISSUER_ID" \
              --output-format json | \
              python3 -c 'import json,sys; print(json.load(sys.stdin)["history"][0]["id"])')
            rm "$KEY_PATH"
            echo "Using most-recent submission ID: $ID"
          fi
          echo "id=$ID" >> "$GITHUB_OUTPUT"

      - name: Wait for notarization to finish
        if: steps.submission.outputs.id != ''
        env:
          AC_API_KEY_BASE64: ${{ secrets.AC_API_KEY_BASE64 }}
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          SUBMISSION_ID: ${{ steps.submission.outputs.id }}
        run: |
          KEY_PATH="$RUNNER_TEMP/api.p8"
          echo -n "$AC_API_KEY_BASE64" | base64 --decode -o "$KEY_PATH"

          xcrun notarytool wait "$SUBMISSION_ID" \
            --key "$KEY_PATH" \
            --key-id "$AC_API_KEY_ID" \
            --issuer "$AC_API_ISSUER_ID" \
            --timeout 2h

          STATUS=$(xcrun notarytool info "$SUBMISSION_ID" \
            --key "$KEY_PATH" \
            --key-id "$AC_API_KEY_ID" \
            --issuer "$AC_API_ISSUER_ID" \
            --output-format json | python3 -c 'import json,sys; print(json.load(sys.stdin)["status"])')

          rm "$KEY_PATH"

          echo "Notarization status: $STATUS"
          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization did not succeed — aborting staple." >&2
            exit 1
          fi

      - name: Download release DMG
        if: steps.submission.outputs.id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'LocalTalk.dmg' \
            --output LocalTalk.dmg

      - name: Staple ticket to DMG
        if: steps.submission.outputs.id != ''
        run: |
          xcrun stapler staple LocalTalk.dmg
          xcrun stapler validate LocalTalk.dmg
          spctl --assess --type open --context context:primary-signature -vv LocalTalk.dmg || true

      - name: Replace release asset
        if: steps.submission.outputs.id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release upload "$TAG" LocalTalk.dmg \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
          echo "Stapled DMG uploaded to $TAG"
