name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Import signing certificate
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(uuidgen)
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo -n "$P12_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          rm "$CERT_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build DMG (signed)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SIGNING_IDENTITY: "Developer ID Application: Evan Rusackas (${{ secrets.APPLE_TEAM_ID }})"
        run: make dmg

      - name: Build DMG (ad-hoc, for PRs)
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        run: make dmg

      - name: Submit DMG for notarization (fire-and-forget)
        id: notarize
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          AC_API_KEY_BASE64: ${{ secrets.AC_API_KEY_BASE64 }}
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
        run: |
          # Submit without --wait so we can publish the release immediately;
          # Gatekeeper's online ticket lookup makes the DMG open cleanly once
          # Apple processes the submission. The staple workflow polls for the
          # ticket and re-uploads a stapled DMG (for offline first-opens).
          KEY_PATH="$RUNNER_TEMP/api.p8"
          echo -n "$AC_API_KEY_BASE64" | base64 --decode -o "$KEY_PATH"

          SUBMIT_OUTPUT=$(xcrun notarytool submit LocalTalk.dmg \
            --key "$KEY_PATH" \
            --key-id "$AC_API_KEY_ID" \
            --issuer "$AC_API_ISSUER_ID" \
            --no-wait \
            --output-format json)

          rm "$KEY_PATH"

          echo "$SUBMIT_OUTPUT"
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])')
          echo "submission-id=$SUBMISSION_ID" >> "$GITHUB_OUTPUT"
          echo "$SUBMISSION_ID" > submission-id.txt

      - name: Upload notarization submission ID
        if: steps.notarize.outputs.submission-id != ''
        uses: actions/upload-artifact@v4
        with:
          name: notarization
          path: submission-id.txt
          retention-days: 7

      - name: Clean up keychain
        if: always() && env.KEYCHAIN_PATH != ''
        run: security delete-keychain "$KEYCHAIN_PATH" || true

      - name: Tag and release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v$(cat VERSION)"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists — skipping release"
            exit 0
          fi
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" LocalTalk.dmg \
            --title "$VERSION" \
            --notes "Download **LocalTalk.dmg**, open it, drag LocalTalk into Applications, and launch. Grant Accessibility and Microphone permissions when prompted. The Whisper model (~150 MB) downloads on first run."
          echo "Published release $VERSION"
