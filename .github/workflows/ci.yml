name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Build DMG
        run: make dmg

      - name: Tag and release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v$(cat VERSION)"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists — skipping release"
            exit 0
          fi
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" LocalTalk.dmg \
            --title "$VERSION" \
            --notes "Download **LocalTalk.dmg**, open it, drag LocalTalk into Applications, and launch. Grant Accessibility and Microphone permissions when prompted. The Whisper model (~150 MB) downloads on first run."
          echo "Published release $VERSION"
