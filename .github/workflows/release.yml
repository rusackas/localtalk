name: Release

on:
  push:
    tags: ['v*.*.*']

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Build DMG
        run: make dmg

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" LocalTalk.dmg \
            --title "${{ github.ref_name }}" \
            --notes "Download **LocalTalk.dmg**, open it, drag LocalTalk into Applications, and launch. Grant Accessibility and Microphone permissions when prompted. The Whisper model (~150 MB) downloads on first run."
